name: dungeonnotes
description: "An offline-first TTRPG campaign tracker."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  file_picker: ^8.3.7
  flutter_svg: ^2.0.17
  go_router: ^14.8.1
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  image: ^4.5.4
  image_picker: ^1.1.2
  intl: ^0.20.2
  path_provider: ^2.1.5
  shared_preferences: ^2.5.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/brand/
    - assets/reference/v1/
